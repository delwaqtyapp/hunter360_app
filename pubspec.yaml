name: hunter360_app
description: "Hunter 360 - Comprehensive Irrigation Management Platform"
publish_to: 'none'
version: 4.99.12+1

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.6
  file_picker: ^6.1.0

  # State Management
  flutter_riverpod: ^2.5.0

  # Navigation
  go_router: ^14.0.0

  # Network
  dio: ^5.4.0

  # Local Storage
  shared_preferences: ^2.2.0

  # UI
  google_fonts: ^6.1.0
  flutter_staggered_animations: ^1.1.1
  percent_indicator: ^4.2.3
  flutter_svg: ^2.0.0
  fl_chart: ^0.68.0
  shimmer: ^3.0.0

  # Utils
  intl: ^0.19.0
  equatable: ^2.0.5
  uuid: ^4.3.0
  path_provider: ^2.1.0
  share_plus: ^7.2.0
  url_launcher: ^6.2.0
  connectivity_plus: ^5.0.0

  # PDF & CSV
  pdf: ^3.10.0
  printing: ^5.12.0
  csv: ^5.1.0

  # Map
  flutter_map: ^6.0.0
  latlong2: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  mockito: ^5.4.0
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/logo_hunter.svg
    - assets/translations/
    - assets/lic_out.lic
