name: hunter360_app
description: "Hunter 360 - Comprehensive Irrigation Management Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # State Management
  flutter_riverpod: ^2.5.0

  # Navigation
  go_router: ^14.0.0

  # Network
  dio: ^5.4.0
  mqtt_client: ^10.0.0
  web_socket_channel: ^2.4.0

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.0
  firebase_messaging: ^15.0.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI
  google_fonts: ^6.1.0
  flutter_staggered_animations: ^1.1.1
  percent_indicator: ^4.2.3

  # Utils
  intl: ^0.19.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  uuid: ^4.3.0
  path_provider: ^2.1.0
  share_plus: ^7.2.0
  url_launcher: ^6.2.0
  connectivity_plus: ^5.0.0

  # Local Auth
  local_auth: ^2.1.0

  # PDF & CSV
  pdf: ^3.10.0
  printing: ^5.12.0
  csv: ^5.1.0

  # Images
  cached_network_image: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  hive_generator: ^2.0.0
  mockito: ^5.4.0
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/translations/
